<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qit</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,200" />
    <script>
        (function (d) {
            var config = {
                kitId: "gti2pui",
                scriptTimeout: 3000,
                async: true,
            },
                h = d.documentElement,
                t = setTimeout(function () {
                    h.className =
                        h.className.replace(/\bwf-loading\b/g, "") + " wf-inactive";
                }, config.scriptTimeout),
                tk = d.createElement("script"),
                f = false,
                s = d.getElementsByTagName("script")[0],
                a;
            h.className += " wf-loading";
            tk.src = "https://use.typekit.net/" + config.kitId + ".js";
            tk.async = true;
            tk.onload = tk.onreadystatechange = function () {
                a = this.readyState;
                if (f || (a && a != "complete" && a != "loaded")) return;
                f = true;
                clearTimeout(t);
                try {
                    Typekit.load(config);
                } catch (e) { }
            };
            s.parentNode.insertBefore(tk, s);
        })(document);
    </script>
</head>

<body>
    <div id="nameInputModal" class="modalOverlay">
        <div class="modalContent">
            <h3>ENTRY</h3>
            <p>名前を入力してください</p>

            <div class="inputGroup">
                <input type="text" id="playerNameInput" placeholder="" maxlength="10">
            </div>

            <button id="entrySubmitBtn" class="btn">参加する</button>
        </div>
    </div>
    <div class="main">
        <div class="contentWrapper">
            <div id="gameScreen">
                <div class="topObj">
                    <div id="topInfo">
                        <div class="infoSide">
                            <p class="label">問題数</p>
                            <p class="data">
                                <span id="currentQ">?</span><span id="Qslash"> / </span><span id="totalQ">?</span>
                            </p>
                        </div>

                        <div class="infoCenter">

                            <div class="noQ">
                                <p>問題文が読み込まれていません。</br>SETTINGSからCsvを読み込むことで表示できるようになります。</p>
                            </div>

                            <div class="q0">
                                <p>ここに前の問題の全文が表示されます</p>
                            </div>

                            <div class="question-box">
                                <p id="questionText">
                                    <span id="qHead">Q.</span><span id="qText"></span>
                                </p>
                                <p id="answerText">
                                    <span id="ansHead">ANS. </span><span id="ansText"></span>
                                </p>
                            </div>
                        </div>
                        <div class="infoSide">
                            <p class="label">ルール</p>
                            <p id="ruleDisplay" class="data">7○3×</p>
                        </div>
                    </div>
                </div>
                <div class="mainObj">
                </div>
                <div class="buzzerArea">
                    <div class="hostButtons">
                        <button class="correctButton">
                            <span class="material-symbols-outlined">circle</span>
                            </br>
                            <span class="judgeSubtext">正解</span>
                        </button>
                        <button class="wrongButton">
                            <span class="material-symbols-outlined">close</span>
                            </br>
                            <span class="judgeSubtext">不正解</span>
                        </button>
                        <button class="throughButton">
                            <span class="material-symbols-outlined">arrow_forward</span>
                            </br>
                            <span class="judgeSubtext">次の問題</span>
                        </button>
                        <button class="resetButton">
                            <span class="material-symbols-outlined">history</span>
                            </br>
                            <span class="judgeSubtext">早押しリセット</span>
                        </button>
                    </div>
                </div>
            </div>
            <div id="settingsScreen">
                <div id="settingContent">
                    <h3 id="settingTitle">SETTINGS</h3>
                    <p class="configLabel">部屋の設定 <span class="settingLabelEng">ROOM CONFIG</span></p>

                    <div class="settingItem">
                        <p class="settingLabel">部屋の名前</p>
                        <div class="settingInput">
                            <input id="roomName" style="--inputBoxWidth:150px">
                        </div>
                    </div>

                    <div class="settingItem">
                        <p class="settingLabel">ルームID</p>
                        <div id="roomID"><span id="roomidText"></span> <span><img
                                    src="img/content_copy_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"
                                    onclick="copy()"></span></div>
                    </div>

                    <div class="settingItem">
                        <p class="settingLabel">問題文を表示する</p>
                        <label class="settingToggle">
                            <input type="checkbox" id="checkShowQuestion" data-target="#csvUploadContainer">
                        </label>
                    </div>

                    <div class="settingItem blockStyle" id="csvUploadContainer" style="display: none;">
                        <p class="settingLabel">問題文（csv）の読み込み</p>

                        <label class="custom-file-upload">
                            <span class="material-symbols-outlined">upload_file</span>
                            <span class="file-label-text">ファイルを選択</span>
                            <input type="file" id="csvFileInput" accept=".csv" />
                        </label>
                        <span id="file-name-display" class="file-name-text">選択されていません</span>
                    </div>


                    <p class="configLabel">ゲームルール <span class="settingLabelEng">GAME RULE</span></p>
                    <div class="customSelect" id="ruleSelect">
                        <div class="selected" id="selectedRuleName">ルールの選択</div>
                        <div class="options" id="ruleOptions">
                            </div>
                        <input type="hidden" id="ruleType" value="">
                    </div>

                    <!-- <div class="customSelect">
                        <div class="selected">
                            N○M×
                        </div>
                        <div class="options">
                            <div class="option selectedOption" data-value="single">
                                N○M×
                            </div>
                            <div class="option" data-value="endless">
                                N+/M-
                            </div>
                            <div class="option" data-value="endless">
                                カスタム
                            </div>
                        </div>
                        <input type="hidden" id="ruleType" value="single">
                    </div> -->

                    <div class="ruleOverview">
                        <p id="ruleOverviewText">ここにルールの説明が表示されます。</p>
                    </div>
                    <br>

                    <div id="parametersContainer"></div>

                    <div class="settingItem">
                        <p class="settingLabel">誤答判定後にボタンをリセットする</p>
                        <label class="settingToggle">
                            <input type="checkbox" id="checkFreeze">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js" type="module"></script>

</html>
